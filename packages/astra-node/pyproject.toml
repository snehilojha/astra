[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "astra-node"
version = "0.1.0"
description = "astra-node: A provider-agnostic framework for building LLM agents with structured tool calling."
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.0,<3.0",
    "anthropic>=0.40.0,<1.0",
    "openai>=1.0,<2.0",
    "tiktoken>=0.7,<1.0",
    "pyyaml>=6.0,<7.0",
    "python-dotenv>=1.0,<2.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0,<9.0",
    "pytest-asyncio>=0.24,<1.0",
    "pytest-mock>=3.14,<4.0",
]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

[tool.hatch.build.targets.wheel]
packages = ["astra_node"]
