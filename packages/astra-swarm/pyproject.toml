[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "astra-swarm"
version = "0.1.0"
description = "Swarm orchestration for the Astra framework — pipeline, parallel, hierarchical."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
dependencies = [
    "astra-node>=0.1.0",
    "pyyaml>=6.0,<7.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0,<9.0",
    "pytest-asyncio>=0.24,<1.0",
    "pytest-mock>=3.14,<4.0",
]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

[tool.hatch.build.targets.wheel]
packages = ["astra_swarm"]
