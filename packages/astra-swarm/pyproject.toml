[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "astra-swarm"
version = "0.0.2"
description = "Astra swarm orchestration"
requires-python = ">=3.11"
license = "MIT"
dependencies = [
    "astra-node",
]

[tool.hatch.build.targets.wheel]
packages = ["astra_swarm"]