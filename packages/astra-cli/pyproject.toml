[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "astra-cli"
version = "0.0.2"
description = "Astra CLI - terminal interface for the Astra agent framework"
requires-python = ">=3.11"
license = "MIT"
dependencies = [
    "astra-node",
    "astra-swarm",
    "typer>=0.12,<1.0",
    "rich>=13.0,<14.0",
    "prompt-toolkit>=3.0,<4.0",
]

[tool.hatch.build.targets.wheel]
packages = ["astra_cli"]

[tool.hatch.build.targets.sdist]
include = ["astra_cli/**", "pyproject.toml"]
